version: '3.8'
services: 
  api:
    build: .
    depends_on:
      - postgres
      - redis
      - ollama
    ports:
      - 8000:8000
    volumes:
      - ./:/usr/src/app:ro
    env_file:
      - ./.env
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  postgres:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres-db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data

  ollama:
    image: ollama/ollama
    ports:
      - 11434:11434
    volumes:
      - ollama-data:/root/.ollama
    env_file:
      - .env
    command: >
      sh -c "
      ollama serve &
      sleep 5 &&
      ollama pull ${LLM_MODEL} &&
      wait
      "

volumes:
  postgres-db:
  redis-data:
  ollama-data: